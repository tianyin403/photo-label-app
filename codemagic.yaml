workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    scripts:
      - name: Set up iOS project (SPM only)
        script: |
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods ios/Runner.xcworkspace
          flutter create --platforms=ios .
          rm -f ios/Runner/GeneratedPluginRegistrant.*
          flutter pub get
      - name: Archive (no signing)
        script: |
          cd ios
          xcodebuild -project Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - your_email@example.com
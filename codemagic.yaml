workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    scripts:
      - name: Set up iOS project (SPM only)
        script: |
          rm -f ios/Podfile ios/Podfile.lock
          rm -rf ios/Pods ios/Runner.xcworkspace
          flutter create --platforms=ios .
          rm -f ios/Runner/GeneratedPluginRegistrant.*
          sed -i '' '/GeneratedPluginRegistrant/d' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
      - name: Archive
        script: |
          cd ios
          xcodebuild -project Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APP_STORE_CONNECT_TEAM_ID \
            -allowProvisioningUpdates
      - name: Export IPA (Ad-Hoc)
        script: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/ios/archive/Runner.xcarchive \
            -exportPath $CM_BUILD_DIR/build/ios/ipa \
            -exportOptionsPlist ExportOptions_adhoc.plist \
            DEVELOPMENT_TEAM=$APP_STORE_CONNECT_TEAM_ID \
            -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - your_email@example.com